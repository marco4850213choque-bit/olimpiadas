<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Torneo</title>
</head>
<body>
    <h2>Torneo 5 Juegos</h2>
    <button onclick="document.getElementById('base').style.display='block';">Base</button>
    <button onclick="document.getElementById('control').style.display='block';">Control</button>
    
    <div id="base" style="display:none; border:1px solid black; margin:10px; padding:10px;">
        <h3>Tabla Base</h3>
        <p>Juego 1: <span id="j1">0</span></p>
        <p>Juego 2: <span id="j2">0</span></p>
    </div>

    <div id="control" style="display:none; border:1px solid red; margin:10px; padding:10px;">
        <h3>Control Remoto</h3>
        <button onclick="document.getElementById('j1').innerText=parseInt(document.getElementById('j1').innerText)+1;">+1 Juego 1</button>
        <button onclick="document.getElementById('j2').innerText=parseInt(document.getElementById('j2').innerText)+1;">+1 Juego 2</button>
    </div>
</body>
</html>
