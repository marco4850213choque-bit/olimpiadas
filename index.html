<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo 5 Juegos - Acceso Libre</title>
    <style>
        body { font-family: system-ui, sans-serif; text-align: center; background-color: #f3f4f6; margin: 0; padding: 15px; color: #1f2937; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); max-width: 500px; margin: 15px auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; font-size: 14px; }
        th, td { border: 1px solid #e5e7eb; padding: 10px; text-align: center; }
        th { background-color: #4f46e5; color: white; }
        tr:nth-child(even) { background-color: #f9fafb; }
        .total-col { font-weight: bold; color: #10b981; background-color: #f0fdf4; }
        button { font-size: 16px; padding: 12px 20px; margin: 5px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-menu { background-color: #4f46e5; color: white; width: 90%; margin: 10px 0; }
        .btn-send { background-color: #10b981; color: white; width: 85%; margin-top: 10px; }
        .hidden { display: none !important; }
        select, input { font-size: 16px; padding: 10px; width: 85%; margin: 10px 0; border-radius: 6px; border: 1px solid #d1d5db; text-align: center; }
        .code-box { font-size: 28px; font-weight: bold; color: #4f46e5; background: #e0e7ff; padding: 10px; border-radius: 6px; display: inline-block; margin: 10px 0; letter-spacing: 2px; }
        .admin-box { background: #fef3c7; border: 1px dashed #f59e0b; padding: 15px; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>

    <!-- PANTALLA 1: MENU INICIAL -->
    <div id="view-inicio" class="card">
        <h2>Torneo 5 Juegos</h2>
        <p>Elige el rol de este celular (Acceso Libre):</p>
        <button class="btn-menu" id="btn-crear-base">🖥️ Celular Base (Ver Tabla)</button>
        <hr style="border: 0; border-top: 1px solid #e5e7eb; margin: 20px 0;">
        
        <p><strong>Ingresar a Estaciones:</strong></p>
        <input type="text" id="input-codigo" maxlength="4" placeholder="Código de la Base (4 números)">
        <select id="select-juego-asignado">
            <option value="Juego 1">Controlar: Juego 1</option>
            <option value="Juego 2">Controlar: Juego 2</option>
            <option value="Juego 3">Controlar: Juego 3</option>
            <option value="Juego 4">Controlar: Juego 4</option>
            <option value="Juego 5">Controlar: Juego 5</option>
        </select>
        <button class="btn-menu" style="background-color: #10b981;" id="btn-crear-control">Ingresar como Estación</button>
    </div>

    <!-- PANTALLA 2: PANTALLA CENTRAL BASE -->
    <div id="view-base" class="card hidden" style="max-width: 100%;">
        <h3>Código de Vinculación: <br><span id="txt-codigo-base" class="code-box">Generando...</span></h3>
        
        <h2>Tabla General de Posiciones</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Equipo</th>
                        <th>Juego 1</th>
                        <th>Juego 2</th>
                        <th>Juego 3</th>
                        <th>Juego 4</th>
                        <th>Juego 5</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="tabla-cuerpo"></tbody>
            </table>
        </div>

        <!-- NUEVA FUNCIÓN: ACTUALIZAR PUNTUACIÓN MANUAL DESDE LA BASE -->
        <div class="admin-box">
            <h4>✏️ Modificar Puntos desde la Base</h4>
            <select id="select-base-equipo"></select>
            <select id="select-base-juego">
                <option value="Juego 1">Juego 1</option>
                <option value="Juego 2">Juego 2</option>
                <option value="Juego 3">Juego 3</option>
                <option value="Juego 4">Juego 4</option>
                <option value="Juego 5">Juego 5</option>
            </select>
            <input type="number" id="input-base-puntos" min="1" max="100" placeholder="Puntos (1 a 100)">
            <button class="btn-send" style="background-color: #d97706; width: 90%;" id="btn-base-actualizar">Actualizar Puntuación Manual 📤</button>
        </div>
        <br>
        <button id="btn-reiniciar" style="background:#6b7280; color:white;">🔄 Reiniciar Todo a 0</button>
    </div>

    <!-- PANTALLA 3: ESTACIONES DE JUEGO (CONTROLES) -->
    <div id="view-control" class="card hidden">
        <h2 id="titulo-juego-control">Estación de Juego</h2>
        <label>1. Selecciona el Equipo:</label>
        <select id="select-equipo-control"></select>
        <label style="display:block; margin-top:15px;">2. Puntos (Rango 1 a 100):</label>
        <input type="number" id="input-puntos-manual" min="1" max="100" placeholder="Ej: 85">
        <button class="btn-send" id="btn-enviar-puntos">Actualizar Puntuación 📤</button>
    </div>

    <script>
        const equipos = ["Equipo 1", "Equipo 2", "Equipo 3", "Equipo 4", "Equipo 5", "Equipo 6"];
        const juegos = ["Juego 1", "Juego 2", "Juego 3", "Juego 4", "Juego 5"];
        let matrizPuntos = {};
        let salaId = "";
        let miJuegoAsignado = "";
        let canalComunicacion;

        // Inicializar estructura limpia en memoria local
        equipos.forEach(eq => { matrizPuntos[eq] = {}; juegos.forEach(ju => matrizPuntos[eq][ju] = 0); });

        // Enlace inmediato de los botones sin bloqueos
        document.getElementById('btn-crear-base').addEventListener('click', iniciarBase);
        document.getElementById('btn-crear-control').addEventListener('click', iniciarControl);
        document.getElementById('btn-enviar-puntos').addEventListener('click', enviarPuntosManual);
        document.getElementById('btn-base-actualizar').addEventListener('click', actualizarPuntosDesdeBase);
        document.getElementById('btn-reiniciar').addEventListener('click', reiniciarTodo);

        function iniciarBase() {
            document.getElementById('view-inicio').classList.add('hidden');
            document.getElementById('view-base').classList.remove('hidden');

            // Genera código aleatorio libre de 4 dígitos para vincular
            salaId = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('txt-codigo-base').innerText = salaId;

            localStorage.setItem('torneo_' + salaId, JSON.stringify(matrizPuntos));
            dibujarTabla();

            // Rellenar select de equipos en la base para la modificación manual
            const selectBaseEq = document.getElementById('select-base-equipo');
            selectBaseEq.innerHTML = '';
            equipos.forEach(eq => selectBaseEq.innerHTML += `<option value="${eq}">${eq}</option>`);

            // Abrir canal local estable
            canalComunicacion = new BroadcastChannel('canal_' + salaId);
            canalComunicacion.onmessage = function(evento) {
                if (evento.data && evento.data.tipo === 'modificar') {
                    matrizPuntos[evento.data.equipo][evento.data.juego] = evento.data.valor;
                    localStorage.setItem('torneo_' + salaId, JSON.stringify(matrizPuntos));
                    dibujarTabla();
                    canalComunicacion.postMessage({ tipo: 'sincronizar', datos: matrizPuntos });
                }
            };
        }

        function dibujarTabla() {
            const cuerpo = document.getElementById('tabla-cuerpo');
            cuerpo.innerHTML = '';
            equipos.forEach(eq => {
                let fila = `<tr><td><strong>${eq}</strong></td>`;
                let total = 0;
                juegos.forEach(ju => {
                    let pts = (matrizPuntos[eq] && matrizPuntos[eq][ju]) ? matrizPuntos[eq][ju] : 0;
                    fila += `<td>${pts}</td>`;
                    total += pts;
                });
                fila += `<td class="total-col">${total}</td></tr>`;
                cuerpo.innerHTML += fila;
            });
        }

        function actualizarPuntosDesdeBase() {
            const eqSel = document.getElementById('select-base-equipo').value;
            const juSel = document.getElementById('select-base-juego').value;
            const puntos = parseInt(document.getElementById('input-base-puntos').value);

            if (isNaN(puntos) || puntos < 1 || puntos > 100) {
                return alert("Error: Introduce una puntuación válida entre 1 y 100.");
            }

            // Actualizar la matriz local de la base directamente
            matrizPuntos[eqSel][juSel] = puntos;
            localStorage.setItem('torneo_' + salaId, JSON.stringify(matrizPuntos));
            dibujarTabla();

            // Notificar a las estaciones que estén conectadas para que tengan el mismo dato
            if (canalComunicacion) {
                canalComunicacion.postMessage({ tipo: 'sincronizar', datos: matrizPuntos });
            }

            document.getElementById('input-base-puntos').value = '';
            alert("¡Marcador actualizado de manera manual en la Base!");
        }

        function iniciarControl() {
            salaId = document.getElementById('input-codigo').value.trim();
            miJuegoAsignado = document.getElementById('select-juego-asignado').value;

            if (salaId.length !== 4 || isNaN(salaId)) {
                return alert("Por favor, ingresa un código válido de 4 números.");
            }

            const datosExistentes = localStorage.getItem('torneo_' + salaId);
            if (!datosExistentes) {
                return alert("El código de 4 dígitos no coincide con ninguna Base activa.");
            }

            matrizPuntos = JSON.parse(datosExistentes);
