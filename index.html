<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo - Centro de Puntaje</title>
    <style>
        body { font-family: system-ui, sans-serif; text-align: center; background-color: #f3f4f6; margin: 0; padding: 15px; color: #1f2937; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); max-width: 650px; margin: 15px auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; font-size: 13px; }
        th, td { border: 1px solid #e5e7eb; padding: 8px; text-align: center; }
        th { background-color: #4f46e5; color: white; }
        tr:nth-child(even) { background-color: #f9fafb; }
        .total-col { font-weight: bold; color: #10b981; background-color: #f0fdf4; }
        button { font-size: 15px; padding: 10px 18px; margin: 5px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-menu { background-color: #4f46e5; color: white; width: 90%; margin: 10px 0; }
        .btn-send { background-color: #10b981; color: white; width: 85%; margin-top: 10px; }
        .hidden { display: none !important; }
        select, input { font-size: 16px; padding: 10px; width: 85%; margin: 10px 0; border-radius: 6px; border: 1px solid #d1d5db; text-align: center; }
        .admin-box { background: #fef3c7; border: 1px dashed #f59e0b; padding: 15px; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>

    <!-- PANTALLA 1: MENU SELECCION INICIAL -->
    <div id="view-inicio" class="card">
        <h2>Torneo 5 Juegos + Puntualidad</h2>
        <p>Selecciona el rol de este dispositivo:</p>
        <!-- NOMBRE MODIFICADO A CENTRO DE PUNTAJE -->
        <button class="btn-menu" id="btn-crear-base">🖥️ Centro de Puntaje (Ver Tabla)</button>
        <hr style="border: 0; border-top: 1px solid #e5e7eb; margin: 20px 0;">
        <p><strong>Modo Celular Estación:</strong></p>
        <select id="select-juego-asignado">
            <option value="Juego 1">Estación: Juego 1</option>
            <option value="Juego 2">Estación: Juego 2</option>
            <option value="Juego 3">Estación: Juego 3</option>
            <option value="Juego 4">Estación: Juego 4</option>
            <option value="Juego 5">Estación: Juego 5</option>
        </select>
        <button class="btn-menu" style="background-color: #10b981;" id="btn-crear-control">Ingresar como Estación ✅</button>
    </div>

    <!-- PANTALLA 2: COMPUTADORA BASE (CENTRO DE PUNTAJE) -->
    <div id="view-base" class="card hidden" style="max-width: 100%;">
        <h2>Centro de Puntaje - Tabla General</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Equipo</th>
                        <th>Juego 1</th>
                        <th>Juego 2</th>
                        <th>Juego 3</th>
                        <th>Juego 4</th>
                        <th>Juego 5</th>
                        <th style="background-color: #d97706;">Puntualidad</th>
                        <th>Promedio Final</th>
                    </tr>
                </thead>
                <tbody id="tabla-cuerpo"></tbody>
            </table>
        </div>

        <div class="admin-box">
            <h4>✏️ Modificar Puntos / Puntualidad desde la Base</h4>
            <select id="select-base-equipo"></select>
            <select id="select-base-juego">
                <option value="Juego 1">Juego 1</option>
                <option value="Juego 2">Juego 2</option>
                <option value="Juego 3">Juego 3</option>
                <option value="Juego 4">Juego 4</option>
                <option value="Juego 5">Juego 5</option>
                <option value="Puntualidad">Casilla Extra: Puntualidad</option>
            </select>
            <input type="number" id="input-base-puntos" min="1" max="100" placeholder="Puntos (1 a 100)">
            <button class="btn-send" style="background-color: #d97706; width: 90%;" id="btn-base-actualizar">Actualizar Puntuación Manual 📤</button>
        </div>
        <br>
        <button id="btn-reiniciar" style="background:#6b7280; color:white;">🔄 Reiniciar Todo a 0</button>
    </div>

    <!-- PANTALLA 3: ESTACIONES DE CELULARES -->
    <div id="view-control" class="card hidden">
        <h2 id="titulo-juego-control">Estación de Juego</h2>
        <label>1. Selecciona el Equipo:</label>
        <select id="select-equipo-control"></select>
        <label style="display:block; margin-top:15px;">2. Puntos a guardar (Rango 1 a 100):</label>
        <input type="number" id="input-puntos-manual" min="1" max="100" placeholder="Ej: 85">
        <button class="btn-send" id="btn-enviar-puntos">Actualizar Puntuación 📤</button>
    </div>

    <script>
        // Servidor HTTP público descentralizado (Sin librerías, inmune a bloqueos)
        var urlNube = "https://restful-api.dev";
        var idTorneoUnico = "torneo_fijo_computadora_estaciones_2026";

        var equipos = ["Equipo 1", "Equipo 2", "Equipo 3", "Equipo 4", "Equipo 5", "Equipo 6"];
        var juegos = ["Juego 1", "Juego 2", "Juego 3", "Juego 4", "Juego 5"];
        var matrizPuntos = {};
        var miJuegoAsignado = "";

        // Inicializar estructura limpia por defecto
        for (var i = 0; i < equipos.length; i++) {
            matrizPuntos[equipos[i]] = { "Puntualidad": 0 };
            for (var j = 0; j < juegos.length; j++) {
                matrizPuntos[equipos[i]][juegos[j]] = 0;
            }
        }

        // Enlace inmediato de funciones nativas
        window.onload = function() {
            document.getElementById('btn-crear-base').onclick = iniciarBase;
            document.getElementById('btn-crear-control').onclick = iniciarControl;
            document.getElementById('btn-enviar-puntos').onclick = enviarPuntosManual;
            document.getElementById('btn-base-actualizar').onclick = actualizarPuntosDesdeBase;
            document.getElementById('btn-reiniciar').onclick = reiniciarTodo;
        };

        function iniciarBase() {
            document.getElementById('view-inicio').classList.add('hidden');
            document.getElementById('view-base').classList.remove('hidden');

            var selectBaseEq = document.getElementById('select-base-equipo');
            selectBaseEq.innerHTML = '';
            for (var i = 0; i < equipos.length; i++) {
                selectBaseEq.innerHTML += '<option value="' + equipos[i] + '">' + equipos[i] + '</option>';
            }

            dibujarTabla();
            subirAInternet();

            // Descarga actualizaciones en segundo plano automáticamente cada 2 segundos sin congelar la app
            setInterval(descargarDeInternet, 2000);
        }

        function dibujarTabla() {
            var cuerpo = document.getElementById('tabla-cuerpo');
            if(!cuerpo) return;
            cuerpo.innerHTML = '';
            
            for (var i = 0; i < equipos.length; i++) {
                var eq = equipos[i];
                var fila = '<tr><td><strong>' + eq + '</strong></td>';
                var sumaTotal = 0;
                
                for (var j = 0; j < juegos.length; j++) {
                    var pts = (matrizPuntos[eq] && matrizPuntos[eq][juegos[j]]) ? matrizPuntos[eq][juegos[j]] : 0;
                    fila += '<td>' + pts + '</td>';
                    sumaTotal += pts;
                }
                
                var puntualidadPts = (matrizPuntos[eq] && matrizPuntos[eq]["Puntualidad"]) ? matrizPuntos[eq]["Puntualidad"] : 0;
                fila += '<td style="background-color: #fef3c7; font-weight:bold;">' + puntualidadPts + '</td>';
                sumaTotal += puntualidadPts;

                var promedioFinal = (sumaTotal / 6).toFixed(1);
                fila += '<td class="total-col">' + promedioFinal + '</td></tr>';
                cuerpo.innerHTML += fila;
            }
        }

        function iniciarControl() {
            miJuegoAsignado = document.getElementById('select-juego-asignado').value;

            document.getElementById('view-inicio').classList.add('hidden');
            document.getElementById('view-control').classList.remove('hidden');
            document.getElementById('titulo-juego-control').innerText = miJuegoAsignado;

            var selectEq = document.getElementById('select-equipo-control');
            selectEq.innerHTML = '';
            for (var i = 0; i < equipos.length; i++) {
                selectEq.innerHTML += '<option value="' + equipos[i] + '">' + equipos[i] + '</option>';
            }

            descargarDeInternet();
        }

        function subirAInternet() {
            fetch(urlNube, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: idTorneoUnico, data: matrizPuntos })
            }).catch(function(e){});
        }

        function descargarDeInternet() {
            fetch(urlNube).then(function(res){ return res.json(); }).then(function(data) {
                var encontrado = data.reverse().find(function(obj){ return obj.name === idTorneoUnico; });
                if (encontrado && encontrado.data) {
                    matrizPuntos = encontrado.data;
                    dibujarTabla();
                }
            }).catch(function(e){});
        }

        function enviarPuntosManual() {
            var eqSel = document.getElementById('select-equipo-control').value;
            var puntos = parseInt(document.getElementById('input-puntos-manual').value);

            if (isNaN(puntos) || puntos < 1 || puntos > 100) {
                alert("Error: Puntuación debe ser entre 1 y 100.");
                return;
            }
